<style>
:root {
  --bg: #0e1a12;
  --surf: #152019;
  --surf2: #1c2b21;
  --border: #263d2c;
  --border2: #1e3024;
  --accent: #62b857;
  --accent2: #45923b;
  --accent-soft: rgba(98,184,87,0.13);
  --text: #e2eed e;
  --text: #e0ecdc;
  --text-m: #7a9e73;
  --text-d: #445e3e;
  --checked: rgba(98,184,87,0.08);
  --radius: 12px;
  --radius-s: 8px;

  /* tag colors */
  --t-org: #3a5c8a; --tc-org: #82b8f0;
  --t-naut: #5a3a8a; --tc-naut: #b882f0;
  --t-eau: #3a6e8a; --tc-eau: #82cef0;
  --t-sed: #8a623a; --tc-sed: #f0b882;
  --t-inv: #6a3a8a; --tc-inv: #c082f0;
  --t-mes: #3a8a6a; --tc-mes: #82f0c0;
  --t-saisie: #8a7a3a; --tc-saisie: #f0e082;
  --t-secu: #8a3a3a; --tc-secu: #f08282;
  --t-hyg: #3a8a5a; --tc-hyg: #82f090;
  --t-equip: #5a6a3a; --tc-equip: #c0f082;
  --t-ech: #6a5a3a; --tc-ech: #f0c882;
  --t-pois: #6a3a5a; --tc-pois: #f082c0;
  --t-bio: #3a5a6a; --tc-bio: #82d0f0;
  --t-out: #5a5a3a; --tc-out: #e0f082;
  --t-phyto: #3a7a6a; --tc-phyto: #82f0d0;
  --t-zoo: #4a6a3a; --tc-zoo: #a8f082;
  --t-marc: #6a6a3a; --tc-marc: #f0f082;
  --t-prel: #3a5a8a; --tc-prel: #82a8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 90px;
  font-size: 15px;
}

/* ====== HEADER ====== */
.hdr {
  position: sticky; top: 0; z-index: 200;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.hdr-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px 8px;
}
.hdr-title {
  font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
  color: var(--accent); display: flex; align-items: center; gap: 7px;
}
.hdr-title span { font-size: 19px; }
.hdr-prog {
  font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-m);
}
.hdr-prog strong { color: var(--accent); font-size: 15px; }

.pbar-wrap { height: 3px; background: var(--border); }
.pbar-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width .3s; }

/* ====== MAIN TABS ====== */
.tabs-main {
  display: flex; overflow-x: auto; gap: 0;
  background: var(--surf); border-bottom: 1px solid var(--border2);
  scrollbar-width: none;
}
.tabs-main::-webkit-scrollbar { display: none; }

.tab-main {
  flex-shrink: 0;
  padding: 10px 15px;
  font-size: 13px; font-weight: 600;
  color: var(--text-m);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all .15s;
  white-space: nowrap;
  user-select: none;
}
.tab-main:hover { color: var(--text); background: var(--surf2); }
.tab-main.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--bg);
}

/* ====== SUB TABS ====== */
.tabs-sub {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 8px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border2);
}
.tab-sub {
  font-size: 12px; font-weight: 600;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-m); cursor: pointer;
  transition: all .15s; user-select: none;
  white-space: nowrap;
}
.tab-sub:hover { background: var(--surf2); color: var(--text); }
.tab-sub.active {
  background: var(--accent-soft);
  border-color: var(--accent); color: var(--accent);
}

/* ====== CONTROLS ====== */
.controls {
  display: flex; gap: 7px; padding: 8px 12px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border2);
  background: var(--bg);
}
.btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 6px 13px; border-radius: 20px;
  border: 1px solid var(--border);
  cursor: pointer; transition: all .15s; letter-spacing: .2px;
}
.btn-reset { background: transparent; color: var(--text-m); }
.btn-reset:hover { background: var(--surf2); color: var(--text); }
.btn-expand { background: transparent; color: var(--text-m); }
.btn-expand:hover { background: var(--surf2); color: var(--text); }
.btn-filter { background: transparent; color: var(--text-m); }
.btn-filter.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

/* ====== SECTIONS ====== */
.sections-wrap { padding: 10px 10px 0; display: flex; flex-direction: column; gap: 8px; }

.section {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.sec-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--surf); cursor: pointer; user-select: none;
  transition: background .15s;
}
.sec-hdr:hover { background: var(--surf2); }
.sec-hdr:active { background: var(--border); }
.sec-title { flex: 1; font-size: 13px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
.sec-cnt { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-m); white-space: nowrap; }
.sec-cnt.done { color: var(--accent); }
.chevron { font-size: 11px; color: var(--text-d); transition: transform .2s; }
.section.collapsed .chevron { transform: rotate(-90deg); }

.sec-minibar { height: 3px; background: var(--border); }
.sec-minibar-fill { height: 100%; background: var(--accent2); transition: width .3s; }

.items-list { display: block; }
.section.collapsed .items-list { display: none; }

/* ====== ITEMS ====== */
.item {
  display: flex; align-items: flex-start; gap: 11px;
  padding: 11px 13px;
  border-top: 1px solid var(--border2);
  cursor: pointer; transition: background .12s;
}
.item:hover { background: var(--surf2); }
.item:active { background: var(--border); }
.item.checked { background: var(--checked); }

.chk {
  width: 21px; height: 21px; min-width: 21px;
  border-radius: 6px; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px; background: var(--surf); transition: all .15s;
}
.item.checked .chk { background: var(--accent); border-color: var(--accent); }
.chk-tick { display: none; color: var(--bg); font-size: 12px; font-weight: 800; line-height: 1; }
.item.checked .chk-tick { display: block; }

.item-body { flex: 1; min-width: 0; }
.item-name {
  font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.35;
  transition: color .15s;
}
.item.checked .item-name { color: var(--text-d); text-decoration: line-through; text-decoration-color: var(--text-d); }
.item-meta { margin-top: 3px; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 20px;
  letter-spacing: .3px; text-transform: uppercase;
}
.item-note { font-size: 11px; color: var(--text-m); font-style: italic; line-height: 1.4; margin-top: 3px; }

/* Tag classes */
.tc-org { background: rgba(58,92,138,.22); color: var(--tc-org); }
.tc-naut { background: rgba(90,58,138,.22); color: var(--tc-naut); }
.tc-eau { background: rgba(58,110,138,.22); color: var(--tc-eau); }
.tc-mes { background: rgba(58,138,106,.22); color: var(--tc-mes); }
.tc-saisie { background: rgba(138,122,58,.22); color: var(--tc-saisie); }
.tc-secu { background: rgba(138,58,58,.22); color: var(--tc-secu); }
.tc-hyg { background: rgba(58,138,90,.22); color: var(--tc-hyg); }
.tc-equip { background: rgba(90,106,58,.22); color: var(--tc-equip); }
.tc-ech { background: rgba(106,90,58,.22); color: var(--tc-ech); }
.tc-pois { background: rgba(106,58,90,.22); color: var(--tc-pois); }
.tc-bio { background: rgba(58,90,106,.22); color: var(--tc-bio); }
.tc-out { background: rgba(90,90,58,.22); color: var(--tc-out); }
.tc-phyto { background: rgba(58,122,106,.22); color: var(--tc-phyto); }
.tc-zoo { background: rgba(74,106,58,.22); color: var(--tc-zoo); }
.tc-marc { background: rgba(106,106,58,.22); color: var(--tc-marc); }
.tc-prel { background: rgba(58,90,138,.22); color: var(--tc-prel); }
.tc-sed { background: rgba(138,98,58,.22); color: var(--tc-sed); }
.tc-inv { background: rgba(106,58,138,.22); color: var(--tc-inv); }

/* Filter missing */
body.filter-missing .item.checked { display: none; }
body.filter-missing .section.all-done { opacity: .4; pointer-events: none; }

/* ====== FLOAT ====== */
.float {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  background: var(--surf); border: 1px solid var(--border);
  border-radius: 30px; padding: 9px 18px;
  display: flex; gap: 14px; align-items: center;
  box-shadow: 0 8px 32px rgba(0,0,0,.55);
  z-index: 300; white-space: nowrap;
}
.fstat .num { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; line-height: 1; }
.fstat .lbl { font-size: 10px; color: var(--text-d); text-transform: uppercase; letter-spacing: .5px; }
.fstat.ok .num { color: var(--accent); }
.fstat.miss .num { color: #e87a7a; }
.fstat.pct .num { color: var(--text-m); }
.fdiv { width: 1px; height: 26px; background: var(--border); }

/* empty state */
.empty { padding: 20px; text-align: center; font-size: 13px; color: var(--text-d); font-style: italic; }
</style>
</head>

// ============================================================
// STATE
// ============================================================
let currentGroup = "peche";
let currentMode = "peche_2a_fixe";
let filterMissing = false;
let allOpen = true;
let checks = {}; // { modeId: { itemKey: bool } }

function storageKey() { return `cl_checks_v2`; }
function saveChecks() { localStorage.setItem(storageKey(), JSON.stringify(checks)); }
function loadChecks() {
  const raw = localStorage.getItem(storageKey());
  checks = raw ? JSON.parse(raw) : {};
}

function modeChecks() {
  if (!checks[currentMode]) checks[currentMode] = {};
  return checks[currentMode];
}

function itemKey(secTitle, itemName) {
  return secTitle + "|" + itemName;
}

// ============================================================
// BUILD UI
// ============================================================
function buildMainTabs() {
  const el = document.getElementById("tabs-main");
  el.innerHTML = "";
  GROUPS.forEach(g => {
    const t = document.createElement("div");
    t.className = "tab-main" + (g.id === currentGroup ? " active" : "");
    t.textContent = g.label;
    t.onclick = () => selectGroup(g.id);
    el.appendChild(t);
  });
}

function buildSubTabs() {
  const modes = Object.entries(MODES).filter(([,m]) => m.group === currentGroup);
  const subEl = document.getElementById("tabs-sub");

  if (modes.length <= 1) {
    subEl.style.display = "none";
    return;
  }
  subEl.style.display = "flex";
  subEl.innerHTML = "";
  modes.forEach(([id, m]) => {
    const t = document.createElement("div");
    t.className = "tab-sub" + (id === currentMode ? " active" : "");
    t.textContent = m.label;
    t.onclick = () => selectMode(id);
    subEl.appendChild(t);
  });
}

function buildSections() {
  const mode = MODES[currentMode];
  const wrap = document.getElementById("sections-wrap");
  wrap.innerHTML = "";
  const mc = modeChecks();

  mode.sections.forEach(sec => {
    const secEl = document.createElement("div");
    secEl.className = "section";
    secEl.id = "sec-" + sec.title.replace(/\s+/g, "_");

    const done = sec.items.filter(it => mc[itemKey(sec.title, it.n)]).length;
    const total = sec.items.length;

    secEl.innerHTML = `
      <div class="sec-hdr" onclick="toggleSec(this.parentElement)">
        <div class="sec-title">${sec.title}</div>
        <div class="sec-cnt ${done===total?'done':''}" id="cnt-${sec.title.replace(/\s+/g,'_')}">${done}/${total}</div>
        <div class="chevron">▼</div>
      </div>
      <div class="sec-minibar"><div class="sec-minibar-fill" style="width:${total?done/total*100:0}%" id="bar-${sec.title.replace(/\s+/g,'_')}"></div></div>
      <div class="items-list" id="list-${sec.title.replace(/\s+/g,'_')}"></div>
    `;

    const list = secEl.querySelector(".items-list");
    sec.items.forEach(it => {
      const key = itemKey(sec.title, it.n);
      const checked = !!mc[key];
      const div = document.createElement("div");
      div.className = "item" + (checked ? " checked" : "");
      div.onclick = () => toggleItem(sec.title, it.n, div, sec.title.replace(/\s+/g,'_'));
      div.innerHTML = `
        <div class="chk"><span class="chk-tick">✓</span></div>
        <div class="item-body">
          <div class="item-name">${it.n}</div>
          <div class="item-meta"><span class="tag ${CAT_CLASS[it.c]||'tc-org'}">${it.c}</span></div>
          ${it.note ? `<div class="item-note">${it.note}</div>` : ""}
        </div>
      `;
      list.appendChild(div);
    });

    if (done === total) secEl.classList.add("all-done");
    wrap.appendChild(secEl);
  });

  updateStats();
}

function toggleItem(secTitle, itemName, el, secId) {
  const key = itemKey(secTitle, itemName);
  const mc = modeChecks();
  mc[key] = !mc[key];
  saveChecks();
  el.classList.toggle("checked", mc[key]);
  updateSecStats(secTitle, secId);
  updateStats();
}

function updateSecStats(secTitle, secId) {
  const mode = MODES[currentMode];
  const sec = mode.sections.find(s => s.title === secTitle);
  if (!sec) return;
  const mc = modeChecks();
  const done = sec.items.filter(it => mc[itemKey(sec.title, it.n)]).length;
  const total = sec.items.length;
  const cntEl = document.getElementById("cnt-" + secId);
  const barEl = document.getElementById("bar-" + secId);
  const secEl = document.getElementById("sec-" + secId);
  if (cntEl) { cntEl.textContent = `${done}/${total}`; cntEl.className = "sec-cnt" + (done===total?" done":""); }
  if (barEl) barEl.style.width = total ? (done/total*100)+"%" : "0%";
  if (secEl) secEl.classList.toggle("all-done", done===total);
}

function updateStats() {
  const mode = MODES[currentMode];
  const mc = modeChecks();
  let done = 0, total = 0;
  mode.sections.forEach(sec => {
    sec.items.forEach(it => {
      total++;
      if (mc[itemKey(sec.title, it.n)]) done++;
    });
  });
  document.getElementById("pg-done").textContent = done;
  document.getElementById("pg-total").textContent = total;
  document.getElementById("global-bar").style.width = total ? (done/total*100)+"%" : "0%";
  document.getElementById("fl-ok").textContent = done;
  document.getElementById("fl-miss").textContent = total - done;
  document.getElementById("fl-pct").textContent = total ? Math.round(done/total*100)+"%" : "0%";
}

// ============================================================
// NAVIGATION
// ============================================================
function selectGroup(gid) {
  currentGroup = gid;
  // Pick first mode in group
  const first = Object.entries(MODES).find(([,m]) => m.group === gid);
  if (first) currentMode = first[0];
  buildMainTabs();
  buildSubTabs();
  buildSections();
}

function selectMode(mid) {
  currentMode = mid;
  buildSubTabs();
  buildSections();
}

// ============================================================
// CONTROLS
// ============================================================
function toggleSec(el) { el.classList.toggle("collapsed"); }

function toggleAll() {
  allOpen = !allOpen;
  document.querySelectorAll(".section").forEach(s => {
    s.classList.toggle("collapsed", !allOpen);
  });
  document.getElementById("btn-expand").textContent = allOpen ? "⊟ Tout fermer" : "⊞ Tout ouvrir";
}

function toggleFilter() {
  filterMissing = !filterMissing;
  document.body.classList.toggle("filter-missing", filterMissing);
  const btn = document.getElementById("btn-filter");
  btn.classList.toggle("active", filterMissing);
  btn.textContent = filterMissing ? "👁 Tout afficher" : "👁 Manquants seuls";
}

function resetCurrent() {
  if (!confirm(`Réinitialiser la liste "${MODES[currentMode].label}" ?`)) return;
  checks[currentMode] = {};
  saveChecks();
  buildSections();
}

// ============================================================
// INIT
// ============================================================
loadChecks();
buildMainTabs();
buildSubTabs();
buildSections();
</script>
